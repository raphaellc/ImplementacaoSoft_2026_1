<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        h1 { color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        li:last-child { border-bottom: none; }
        .concluida { text-decoration: line-through; color: #888; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; white-space: nowrap; }
        .status-ok { background: #d4edda; color: #155724; }
        .status-pendente { background: #fff3cd; color: #856404; }
        .info-tarefa { flex: 1; }
        button { cursor: pointer; padding: 5px 10px; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        button.btn-concluir { background: #28a745; font-size: 0.85em; }
        button.btn-concluir:hover { background: #1e7e34; }
        .form-nova-tarefa { display: flex; gap: 8px; margin-bottom: 20px; }
        .form-nova-tarefa input { flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .form-nova-tarefa button { white-space: nowrap; }
        .mensagem-erro { color: red; font-size: 0.9em; margin-bottom: 8px; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Minhas Tarefas</h1>

    <form class="form-nova-tarefa" onsubmit="criarTarefa(event)">
        <input type="text" id="input-descricao" placeholder="Descrição da nova tarefa..." maxlength="255" required>
        <button type="submit">Adicionar</button>
    </form>
    <p class="mensagem-erro" id="erro-criar"></p>

    <button onclick="carregarTarefas()">Atualizar Lista</button>
    <ul id="lista-tarefas">
        <li>Carregando tarefas...</li>
    </ul>
</div>

<script>
    const API_URL = '/api/tarefas';

    async function carregarTarefas() {
        const listaUl = document.getElementById('lista-tarefas');

        try {
            const response = await fetch(API_URL);

            if (!response.ok) throw new Error('Erro ao buscar dados da API');

            const tarefas = await response.json();
            listaUl.innerHTML = '';

            if (tarefas.length === 0) {
                listaUl.innerHTML = '<li>Nenhuma tarefa encontrada.</li>';
                return;
            }

            tarefas.forEach(tarefa => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="info-tarefa ${tarefa.concluida ? 'concluida' : ''}">
                        <strong>#${tarefa.id}</strong> - ${escapeHtml(tarefa.descricao)}
                    </span>
                    <span class="badge ${tarefa.concluida ? 'status-ok' : 'status-pendente'}">
                        ${tarefa.concluida ? 'Concluída' : 'Pendente'}
                    </span>
                    ${!tarefa.concluida
                        ? `<button class="btn-concluir" onclick="concluirTarefa(${tarefa.id})">Concluir</button>`
                        : ''}
                `;
                listaUl.appendChild(li);
            });

        } catch (error) {
            console.error('Erro:', error);
            listaUl.innerHTML = `<li style="color:red">Erro ao conectar com a API: ${escapeHtml(error.message)}</li>`;
        }
    }

    async function criarTarefa(event) {
        event.preventDefault();
        const input = document.getElementById('input-descricao');
        const erroEl = document.getElementById('erro-criar');
        const descricao = input.value.trim();

        erroEl.textContent = '';

        if (!descricao) {
            erroEl.textContent = 'A descrição não pode ser vazia.';
            return;
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ descricao })
            });

            if (!response.ok) {
                const data = await response.json();
                erroEl.textContent = data.mensagem || 'Erro ao criar tarefa.';
                return;
            }

            input.value = '';
            await carregarTarefas();

        } catch (error) {
            erroEl.textContent = 'Erro ao conectar com a API.';
            console.error('Erro:', error);
        }
    }

    async function concluirTarefa(id) {
        try {
            const response = await fetch(`${API_URL}/${id}`, { method: 'PUT' });

            if (!response.ok) {
                const data = await response.json();
                alert(data.mensagem || 'Erro ao concluir tarefa.');
                return;
            }

            await carregarTarefas();

        } catch (error) {
            alert('Erro ao conectar com a API.');
            console.error('Erro:', error);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    window.onload = carregarTarefas;
</script>

</body>
</html>
