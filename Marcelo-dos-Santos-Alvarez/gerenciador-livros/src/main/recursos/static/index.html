<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Livros</title>

    <link rel="stylesheet" href="styles.css" />
    <script src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Meus Livros</h1>
      <input
        type="text"
        name="novo-livro-input"
        id="novo-livro-input"
        placeholder="Nome do novo livro"
      />
			<button onclick="adicionarLivro()">Adicionar Livro</button>
      <button onclick="carregarLivros()">Atualizar Lista</button>
      <ul id="lista-livros">
        <li>Carregando livros...</li>
      </ul>
    </div>
  </body>
</html>
