<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login - Aula MVC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="login-container">
        <header>
            <h1>Acesso ao Sistema</h1>
            <p>Entre com suas credenciais para continuar.</p>
        </header>

        <!-- Formulário de Login (View) -->
        <form id="loginForm" aria-labelledby="login-title">
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required 
                       placeholder="exemplo@escola.com" aria-required="true">
            </div>

            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required 
                       placeholder="Sua senha secreta" aria-required="true">
            </div>

            <button type="submit" id="loginBtn">Entrar</button>
        </form>

        <div id="mensagem" class="mensagem-alerta" aria-live="polite"></div>

        <footer class="social-impact">
            <p><strong>Compromisso Social:</strong> Este sistema foi projetado com foco em acessibilidade digital e inclusão, garantindo que todos os indivíduos tenham acesso igualitário à tecnologia.</p>
        </footer>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
